version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=aahar_ai_jwt_secret_key_2026
      - JWT_EXPIRES_IN=24h
      - NODE_ENV=production
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  vendor-app:
    build: ./vendor-app
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin-dashboard:
    build: ./admin-dashboard
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
